version: "3.8"

services:
  api:
    image: 908027401522.dkr.ecr.us-east-1.amazonaws.com/expense_tracker/api:latest
    container_name: expense-tracker-api
    ports:
      - "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Database
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ExpenseTracker;Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false,connectTimeout=10000,syncTimeout=10000,asyncTimeout=10000,connectRetry=3
      # AWS
      - AWS__Region=${AWS_REGION}
      - AWS__AccessKey=${AWS_ACCESS_KEY}
      - AWS__SecretKey=${AWS_SECRET_KEY}
      - AWS__Cognito__UserPoolId=${COGNITO_USER_POOL_ID}
      - AWS__Cognito__ClientId=${COGNITO_CLIENT_ID}
      - AWS__Cognito__ClientSecret=${COGNITO_CLIENT_SECRET}
      - AWS__Cognito__Region=${AWS_REGION}
      - AWS__EventBridge__EventBusName=default
      - AWS__EventBridge__Source=expense-tracker.export
      - AWS__S3__ExportBucketName=${S3_EXPORT_BUCKET}
      - AWS__S3__PresignedUrlExpiryMinutes=5
      # CORS
      - CorsSettings__AllowedOrigins__0=${FRONTEND_URL}
      # OpenAI
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__Model=gpt-4o-mini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: expense-tracker-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ExpenseTracker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: expense-tracker-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redisinsight:
    image: redis/redisinsight:latest
    container_name: expense-tracker-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  postgres_data:
  redis_data:
