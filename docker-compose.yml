services:
  api:
    image: 908027401522.dkr.ecr.us-east-1.amazonaws.com/expense_tracker/api:latest
    container_name: expense-tracker-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ExpenseTracker;Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-admin}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-},abortConnect=false,connectTimeout=10000,syncTimeout=10000,asyncTimeout=10000,connectRetry=3
      - AWS__Region=${AWS_REGION:-us-east-1}
      - AWS__AccessKey=${AWS_ACCESS_KEY:-}
      - AWS__SecretKey=${AWS_SECRET_KEY:-}
      - AWS__Cognito__UserPoolId=${COGNITO_USER_POOL_ID:-}
      - AWS__Cognito__ClientId=${COGNITO_CLIENT_ID:-}
      - AWS__Cognito__ClientSecret=${COGNITO_CLIENT_SECRET:-}
      - AWS__Cognito__Region=${AWS_REGION:-us-east-1}
      - AWS__EventBridge__EventBusName=default
      - AWS__EventBridge__Source=expense-tracker.export
      - AWS__S3__ExportBucketName=${S3_EXPORT_BUCKET:-}
      - AWS__S3__PresignedUrlExpiryMinutes=5
      - CorsSettings__AllowedOrigins__0=https://usespendio.com
      - CorsSettings__AllowedOrigins__1=https://www.usespendio.com
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - OpenAI__Model=gpt-4o-mini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: expense-tracker-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ExpenseTracker
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: expense-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
